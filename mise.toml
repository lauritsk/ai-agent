[tools]
cocogitto = "7.0.0"
gitleaks = "8.30.1"
sqlite = "3.52.0"
uv = "0.11.3"

[tasks.format]
description = "Format Python code"
run = "uv format --preview-features format"

[tasks.lint]
description = "Lint the project"
run = "uv run ruff check"

[tasks.typecheck]
description = "Type-check the project"
run = "uv run ty check"

[tasks.secrets]
description = "Scan the repository for secrets"
run = "gitleaks dir ."

[tasks.audit]
description = "Audit dependencies for vulnerabilities"
run = "uv audit --preview-features audit --locked"

[tasks.commits]
description = "Enforce conventional commits"
run = "cog check"

[tasks.check]
description = "Run project checks"
depends = ["lint", "typecheck", "secrets", "audit", "commits"]
