[tools]
cocogitto = "7.0.0"
gitleaks = "8.30.1"
sqlite = "latest"
uv = "latest"

[tasks.ruff]
description = "Lint the project"
run = "uv run ruff check --fix"

[tasks.ty]
description = "Type-check the project"
run = "uv run ty check"

[tasks.gitleaks]
description = "Scan the repository for secrets"
run = "gitleaks dir ."

[tasks.cocogitto]
description = "Enforce conventional commits"
run = "cog check"

[tasks.pre-commit]
description = "Run pre-commit checks"
depends = ["ruff", "ty", "gitleaks", "cocogitto"]
